<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>OSCP Commander</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&display=swap');
:root {
  --bg:#0d1117; --bg2:#161b22; --bg3:#1c2333; --bg4:#21262d;
  --border:#30363d; --border-hi:#58a6ff;
  --green:#3fb950; --green-dim:#1a4422;
  --red:#f85149; --yellow:#d29922;
  --blue:#58a6ff; --purple:#bc8cff; --orange:#e8873a;
  --text:#e6edf3; --dim:#7d8590; --muted:#484f58;
  --accent:#238636; --accent-hi:#2ea043; --r:5px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace;font-size:13px;display:flex;flex-direction:column;}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:var(--bg);}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px;}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{font-size:14px;font-weight:600;color:var(--green);letter-spacing:2px;}
.logo em{color:var(--red);font-style:normal;}
.git-badge{font-size:10px;padding:2px 8px;border-radius:10px;border:1px solid var(--border);color:var(--dim);cursor:pointer;white-space:nowrap;}
.git-badge.ok{border-color:var(--green-dim);color:var(--green);}
.git-badge.err{border-color:var(--red);color:var(--red);}
.git-badge.upd{border-color:var(--yellow);color:var(--yellow);}
.ml-auto{margin-left:auto;}

/* box tabs */
.boxtabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);padding:0 8px;flex-shrink:0;overflow-x:auto;}
.boxtab{display:flex;align-items:center;gap:6px;padding:7px 14px;cursor:pointer;border-bottom:2px solid transparent;color:var(--dim);font-size:12px;white-space:nowrap;user-select:none;}
.boxtab:hover{color:var(--text);}
.boxtab.active{color:var(--blue);border-bottom-color:var(--blue);}
.boxtab .prog{font-size:9px;color:var(--muted);background:var(--bg3);padding:1px 5px;border-radius:8px;}
.boxtab .prog.has{color:var(--green);background:var(--green-dim);}
.add-btn{padding:7px 12px;color:var(--dim);cursor:pointer;font-size:16px;border:none;background:none;}
.add-btn:hover{color:var(--green);}
.os-dot{display:inline-block;width:7px;height:7px;border-radius:50%;flex-shrink:0;}
.os-dot.linux{background:var(--orange);}
.os-dot.windows{background:var(--blue);}
.os-dot.ad{background:var(--purple);}

/* layout */
.main{display:flex;flex:1;overflow:hidden;}
.empty-full{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(--dim);font-size:12px;text-align:center;padding:40px;}
.empty-full .big{font-size:32px;}

/* left panel */
.left{width:270px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.ls{border-bottom:1px solid var(--border);flex-shrink:0;}
.ls-title{padding:6px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1.2px;color:var(--dim);display:flex;justify-content:space-between;align-items:center;}
.ls-title .lbtn{background:none;border:none;color:var(--dim);cursor:pointer;font-family:inherit;font-size:10px;}
.ls-title .lbtn:hover{color:var(--blue);}
.ls-body{padding:4px 10px 8px;}
.row{display:flex;gap:5px;align-items:center;}

/* inputs */
.sel,.tinput{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:4px 6px;border-radius:var(--r);outline:none;}
.sel{flex:1;}
.sel:focus,.tinput:focus{border-color:var(--border-hi);}
.ta{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;padding:5px;border-radius:var(--r);resize:vertical;min-height:55px;max-height:100px;outline:none;margin-top:4px;}
.ta:focus{border-color:var(--border-hi);}

/* port chips */
.chips{display:flex;flex-wrap:wrap;gap:3px;margin-top:4px;}
.chip{background:var(--bg4);border:1px solid var(--border);border-radius:3px;padding:2px 5px;font-size:10px;color:var(--blue);cursor:pointer;display:flex;align-items:center;gap:3px;}
.chip:hover{border-color:var(--red);}
.chip .cx{color:var(--muted);font-size:9px;}
.chip:hover .cx{color:var(--red);}

/* variables */
.vars-scroll{overflow-y:auto;padding:4px 10px 6px;flex:1;}
.vrow{display:grid;grid-template-columns:90px 1fr 18px;gap:3px;margin-bottom:4px;align-items:center;}
.vkey{font-size:10px;color:var(--yellow);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:help;}
.vval{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:11px;padding:3px 5px;border-radius:3px;outline:none;width:100%;}
.vval:focus{border-color:var(--yellow);}
.vval.set{border-color:var(--green-dim);color:var(--green);}
.vdel{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:0;}
.vdel:hover{color:var(--red);}
.divider{border-top:1px solid var(--border);margin:6px 0;padding-top:6px;}
.sublabel{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;}
.add-row{display:flex;gap:4px;margin-top:2px;}
.vkey-in{width:78px;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;padding:3px 5px;border-radius:3px;outline:none;}
.vkey-in:focus{border-color:var(--yellow);}
.vval-in{flex:1;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;padding:3px 5px;border-radius:3px;outline:none;}
.vval-in:focus{border-color:var(--yellow);}
.extras-sel{width:100%;background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:10px;padding:3px 5px;border-radius:3px;outline:none;margin-bottom:4px;}
.extras-sel:focus{border-color:var(--yellow);}

/* utils bottom popup */
.utils-fab{position:absolute;bottom:18px;right:18px;background:var(--bg3);border:1px solid var(--border);color:var(--dim);font-family:inherit;font-size:11px;padding:6px 14px;border-radius:20px;cursor:pointer;z-index:50;display:none;gap:6px;align-items:center;}
.utils-fab:hover{border-color:var(--border-hi);color:var(--text);}
.utils-fab.visible{display:flex;}
.utils-popup{position:absolute;bottom:0;left:0;right:0;background:var(--bg2);border-top:2px solid var(--border-hi);z-index:100;display:none;flex-direction:column;max-height:55%;}
.utils-popup.open{display:flex;}
.utils-popup-hdr{display:flex;align-items:center;justify-content:space-between;padding:7px 14px;background:var(--bg3);border-bottom:1px solid var(--border);flex-shrink:0;}
.utils-popup-title{font-size:11px;color:var(--blue);font-weight:600;text-transform:uppercase;letter-spacing:1px;}
.utils-close{background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px;line-height:1;padding:0;}
.utils-close:hover{color:var(--text);}
.utils-popup-body{overflow-y:auto;flex:1;}
.utils-shdr{padding:5px 14px 2px;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);background:var(--bg3);position:sticky;top:0;}
.utils-row{display:flex;align-items:stretch;border-bottom:1px solid #1c2333;padding:3px 0 3px 14px;}
.utils-txt{flex:1;font-size:12px;color:var(--text);word-break:break-all;white-space:pre-wrap;padding-right:4px;line-height:1.6;}
.utils-cp{flex-shrink:0;width:26px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:11px;}
.utils-cp:hover{color:var(--blue);}
.utils-run{flex-shrink:0;width:28px;background:transparent;border:none;border-left:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center;}
.utils-run:hover{background:var(--accent);color:#fff;}

/* buttons */
.btn{background:var(--bg3);border:1px solid var(--border);color:var(--dim);font-family:inherit;font-size:10px;padding:4px 7px;border-radius:var(--r);cursor:pointer;white-space:nowrap;}
.btn:hover{border-color:var(--border-hi);color:var(--text);}
.btn.g{border-color:var(--green-dim);color:var(--green);}
.btn.g:hover{background:var(--green-dim);}

/* plan panel */
.plan{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.plan-tabs{display:flex;background:var(--bg3);border-bottom:1px solid var(--border);padding:0 8px;flex-shrink:0;overflow-x:auto;}
.ptab{padding:6px 11px;font-size:11px;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;user-select:none;display:flex;align-items:center;gap:5px;}
.ptab:hover{color:var(--text);}
.ptab.active{color:var(--blue);border-bottom-color:var(--blue);}
.ptab .pp{font-size:9px;color:var(--muted);}
.ptab .pp.d{color:var(--green);}
.pdot{width:6px;height:6px;border-radius:50%;display:inline-block;flex-shrink:0;}
.ptab[data-phase=recon]      .pdot{background:var(--dim);}
.ptab[data-phase=port]       .pdot{background:var(--blue);}
.ptab[data-phase=foothold]   .pdot{background:var(--red);}
.ptab[data-phase=enum]       .pdot{background:var(--orange);}
.ptab[data-phase=privesc]    .pdot{background:var(--yellow);}
.ptab[data-phase=ad_enum]    .pdot{background:var(--purple);}
.ptab[data-phase=ad_attacks] .pdot{background:var(--red);}

/* commands */
.cmds{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:1px;}
.sec-hdr{font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--blue);padding:8px 2px 3px;display:flex;justify-content:space-between;}
.sec-hdr:first-child{padding-top:0;}
.sec-prog{color:var(--muted);letter-spacing:0;text-transform:none;}
.crow{display:flex;align-items:stretch;border:1px solid var(--border);border-radius:var(--r);background:var(--bg2);transition:background .1s;}
.crow:hover:not(.done){background:var(--bg3);border-color:#3d444d;}
.crow.done{opacity:.35;}
.crow.done .ctxt{text-decoration:line-through;color:var(--muted);}
.crun{flex-shrink:0;width:26px;background:transparent;border:none;border-right:1px solid var(--border);color:var(--muted);cursor:pointer;font-size:9px;display:flex;align-items:center;justify-content:center;border-radius:var(--r) 0 0 var(--r);}
.crun:hover{background:var(--accent);color:#fff;}
.done .crun:hover{background:transparent;color:var(--muted);}
.cbody{flex:1;padding:4px 8px;min-width:0;}
.ccmt{font-size:10px;color:var(--dim);font-style:italic;margin-bottom:1px;}
.ctxt{font-size:12px;word-break:break-all;white-space:pre-wrap;line-height:1.55;}
.cacts{display:flex;flex-direction:column;padding:2px;gap:1px;border-left:1px solid var(--border);flex-shrink:0;}
.cbtn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px;}
.cbtn:hover{background:var(--bg4);color:var(--text);}
.ph{color:var(--yellow);background:rgba(210,153,34,.12);border-radius:2px;padding:0 1px;}
.ph.s{color:var(--green);background:rgba(63,185,80,.1);}
.ph.m{color:var(--red);background:rgba(248,81,73,.1);}

/* toast */
.toast{position:fixed;bottom:18px;right:18px;padding:6px 14px;border-radius:var(--r);font-size:11px;border:1px solid;opacity:0;pointer-events:none;z-index:1000;transition:opacity .2s;max-width:340px;}
.toast.show{opacity:1;}
.toast.ok{background:#0d1f0f;border-color:var(--green);color:var(--green);}
.toast.err{background:#1f0d0d;border-color:var(--red);color:var(--red);}
.toast.info{background:#0d1520;border-color:var(--blue);color:var(--blue);}

/* modal */
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center;z-index:500;}
.mbg.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:20px;min-width:340px;max-width:440px;display:flex;flex-direction:column;gap:12px;}
.modal h3{font-size:13px;color:var(--blue);font-weight:600;}
.modal label{font-size:11px;color:var(--dim);display:flex;flex-direction:column;gap:4px;}
.modal input,.modal select{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-family:inherit;font-size:12px;padding:6px 8px;border-radius:var(--r);outline:none;}
.modal input:focus,.modal select:focus{border-color:var(--border-hi);}
.mbtns{display:flex;gap:8px;justify-content:flex-end;}
.bok{background:var(--accent);border:none;color:#fff;font-family:inherit;font-size:12px;padding:6px 16px;border-radius:var(--r);cursor:pointer;}
.bok:hover{background:var(--accent-hi);}
.bcancel{background:transparent;border:1px solid var(--border);color:var(--dim);font-family:inherit;font-size:12px;padding:6px 12px;border-radius:var(--r);cursor:pointer;}
.bcancel:hover{border-color:var(--red);color:var(--red);}

/* hint bar */
.hint{padding:3px 12px;background:var(--bg2);border-top:1px solid var(--border);font-size:10px;color:var(--muted);flex-shrink:0;display:flex;gap:16px;}
kbd{background:var(--bg3);border:1px solid var(--border);border-radius:2px;padding:0 3px;font-family:inherit;font-size:9px;}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">OSCP<em>//</em>CMD</div>
  <div id="git-badge" class="git-badge" onclick="manualPull()" title="Click to force git pull">⟳ git</div>
  <div class="ml-auto"><button class="btn" onclick="refreshSessions()">↺ Sessions</button></div>
</div>

<div class="boxtabs" id="boxtabs">
  <button class="add-btn" onclick="openModal('mbox')" title="Add box">＋</button>
</div>

<div class="main" id="main">
  <div class="empty-full" id="no-box">
    <div class="big">🎯</div>
    <div>No boxes yet — click <strong>＋</strong> to add one</div>
    <div style="color:var(--muted);font-size:11px">One per standalone box + one for the AD set</div>
  </div>
</div>

<div class="hint">
  <span><kbd>Ctrl</kbd>+<kbd>Enter</kbd> send</span>
  <span><kbd>C</kbd> copy · <kbd>D</kbd> done</span>
</div>

<div class="toast" id="toast"></div>

<!-- Add box modal -->
<div class="mbg" id="mbox">
  <div class="modal">
    <h3>Add Box</h3>
    <label>Name (e.g. box1, dc01)<input id="nb-name" placeholder="box1" maxlength="32"></label>
    <label>OS type
      <select id="nb-os">
        <option value="linux">🐧 Linux</option>
        <option value="windows">🪟 Windows</option>
        <option value="ad">🏰 Active Directory</option>
      </select>
    </label>
    <label>Screen session (optional)
      <select id="nb-sess"><option value="">— none yet —</option></select>
    </label>
    <div class="mbtns">
      <button class="bcancel" onclick="closeModal('mbox')">Cancel</button>
      <button class="bok" onclick="createBox()">Create</button>
    </div>
  </div>
</div>

<!-- New session modal -->
<div class="mbg" id="msess">
  <div class="modal">
    <h3>New Screen Session</h3>
    <label>Session name<input id="ns-name" placeholder="box1" maxlength="32"></label>
    <div class="mbtns">
      <button class="bcancel" onclick="closeModal('msess')">Cancel</button>
      <button class="bok" onclick="createSession()">Create</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let boxes       = {};
let curBox      = null;
let curTab      = null;
let plans       = {};
let sessions    = [];
let extraDefs   = [];
let utilsOpen   = false;
let utilsSecs   = [];

// ── Boot ───────────────────────────────────────────────────────────────────
async function init() {
  const r = await api('GET', '/api/init');
  if (r.boxes) r.boxes.forEach(b => boxes[b.id] = b);
  updateGit(r.git);
  await refreshSessions();
  renderBoxTabs();
  const ids = Object.keys(boxes);
  if (ids.length) await switchBox(ids[0]);
}

// ── Git ────────────────────────────────────────────────────────────────────
function updateGit(gs) {
  if (!gs) return;
  const el = document.getElementById('git-badge');
  if (gs.error) {
    el.className = 'git-badge err';
    el.textContent = '⚠ git';
    el.title = gs.error;
  } else if (gs.new_cmds?.length) {
    el.className = 'git-badge upd';
    el.textContent = `⟳ ${gs.new_cmds.length} new`;
  } else if (gs.last_pull) {
    el.className = 'git-badge ok';
    el.textContent = `✓ ${gs.last_pull}`;
  }
}

async function manualPull() {
  toast('Pulling…', 'info');
  const r = await api('POST', '/api/git/pull');
  updateGit(r);
  if (r.changed_files?.length) {
    plans = {};
    if (curBox) await loadPlan(curBox);
  }
  toast(r.error ? 'Pull error: ' + r.error : '✓ Up to date', r.error ? 'err' : 'ok');
}

// ── Sessions ───────────────────────────────────────────────────────────────
async function refreshSessions() {
  const r = await api('GET', '/api/sessions');
  sessions = r.sessions || [];
  updateSessionSelects();
}

function updateSessionSelects() {
  // All session dropdowns in left panel
  document.querySelectorAll('.sess-sel').forEach(sel => {
    const v = sel.value;
    sel.innerHTML = '<option value="">— none —</option>';
    sessions.forEach(s => sel.appendChild(makeOpt(s, s)));
    if (v) sel.value = v;
  });
  // Modal
  const ms = document.getElementById('nb-sess');
  if (ms) {
    ms.innerHTML = '<option value="">— none yet —</option>';
    sessions.forEach(s => ms.appendChild(makeOpt(s, s)));
  }
}

function makeOpt(val, txt) {
  const o = document.createElement('option');
  o.value = val; o.textContent = txt; return o;
}

async function createSession() {
  const name = document.getElementById('ns-name').value.trim();
  if (!name) return;
  const r = await api('POST', '/api/sessions', { name });
  if (r.error) { toast(r.error, 'err'); return; }
  await refreshSessions();
  closeModal('msess');
  toast(`Session '${name}' created`, 'ok');
  // Auto-assign to current box if it has none
  if (curBox && !boxes[curBox].session) {
    const match = sessions.find(s => s.endsWith('.' + name)) || name;
    boxes[curBox].session = match;
    await api('PATCH', `/api/boxes/${curBox}`, { session: match });
    updateSessionSelects();
    const sel = document.querySelector('.sess-sel');
    if (sel) sel.value = match;
  }
}

// ── Box tabs ───────────────────────────────────────────────────────────────
function renderBoxTabs() {
  const bar    = document.getElementById('boxtabs');
  bar.querySelectorAll('.boxtab').forEach(e => e.remove());
  const addBtn = bar.querySelector('.add-btn');

  Object.values(boxes).forEach(box => {
    const done  = box.done_cmds?.length || 0;
    const total = planTotal(box.id);
    const tab   = document.createElement('div');
    tab.className = 'boxtab' + (box.id === curBox ? ' active' : '');
    tab.innerHTML = `<span class="os-dot ${box.os}"></span><span>${esc(box.name)}</span>` +
      (total ? `<span class="prog ${done ? 'has' : ''}">${done}/${total}</span>` : '');
    tab.onclick = () => switchBox(box.id);
    bar.insertBefore(tab, addBtn);
  });

  document.getElementById('no-box').style.display =
    Object.keys(boxes).length ? 'none' : 'flex';
}

function planTotal(boxId) {
  return (plans[boxId] || []).reduce((a, s) =>
    a + (s.sections || []).reduce((b, sec) => b + sec.commands.length, 0), 0);
}

// ── Switch box ─────────────────────────────────────────────────────────────
async function switchBox(boxId) {
  curBox = boxId;
  curTab = null;
  utilsOpen = false;
  renderBoxTabs();
  buildLayout();
  await renderLeft(boxId);
  await loadPlan(boxId);
}

// Build two-column layout; always reset plan-col on each box switch
function buildLayout() {
  const main = document.getElementById('main');
  if (!document.getElementById('layout')) {
    main.innerHTML = '';
    const layout = document.createElement('div');
    layout.id = 'layout';
    layout.style.cssText = 'display:flex;flex:1;overflow:hidden;width:100%;position:relative;';
    const left = document.createElement('div');
    left.id = 'left-col'; left.className = 'left';
    const plan = document.createElement('div');
    plan.id = 'plan-col'; plan.className = 'plan';
    layout.appendChild(left); layout.appendChild(plan);
    main.appendChild(layout);
  }
  // Always reset plan-col to loading state when switching box
  const col = document.getElementById('plan-col');
  if (col) col.innerHTML = '<div class="cmds" style="align-items:center;justify-content:center;"><span style="color:var(--dim)">Loading plan…</span></div>';

  // Add FAB + popup if not present
  const layout = document.getElementById('layout');
  if (layout && !document.getElementById('utils-fab')) {
    const fab = document.createElement('button');
    fab.id = 'utils-fab'; fab.className = 'utils-fab visible';
    fab.innerHTML = '🔧 Utils';
    fab.onclick = () => toggleUtils();
    layout.appendChild(fab);

    const popup = document.createElement('div');
    popup.id = 'utils-popup'; popup.className = 'utils-popup';
    popup.innerHTML = '<div class="utils-popup-hdr">' +
      '<span class="utils-popup-title" id="utils-popup-title">Utils</span>' +
      '<button class="utils-close" onclick="toggleUtils()">✕</button></div>' +
      '<div class="utils-popup-body" id="utils-popup-body"></div>';
    layout.appendChild(popup);
  }
}

// ── Left panel ─────────────────────────────────────────────────────────────
async function renderLeft(boxId) {
  const box  = boxes[boxId];
  const left = document.getElementById('left-col');
  if (!box || !left) return;

  // Load extras schema
  const sr = await api('GET', `/api/vars_schema/${box.os}`);
  extraDefs = sr.extra_vars || [];

  // Load utils for this OS
  const ur = await api('GET', `/api/utils/${box.os}`);
  utilsSecs = ur.sections || [];

  const varKeys    = Object.keys(box.variables || {});
  const customKeys = Object.keys(box.custom_vars || {});
  const activeSet  = new Set(box.active_extras || []);

  // Which extras are not already shown
  const availExtras = extraDefs.filter(v =>
    !varKeys.includes(v.key) && !activeSet.has(v.key) && !customKeys.includes(v.key));

  // All var rows
  const allVarRows = [
    ...varKeys.map(k => varRowHtml(k, box.variables[k] || '', false)),
    ...Array.from(activeSet).filter(k => !varKeys.includes(k) && !customKeys.includes(k))
      .map(k => varRowHtml(k, '', true)),
    ...customKeys.map(k => varRowHtml(k, box.custom_vars[k] || '', true)),
  ].join('');

  left.innerHTML = `
    <div class="ls">
      <div class="ls-title">Screen Session
        <button class="lbtn" onclick="openNewSess()">+ new</button>
      </div>
      <div class="ls-body">
        <div class="row">
          <select class="sel sess-sel" onchange="onSessChange('${boxId}',this.value)">
            <option value="">— none —</option>
            ${sessions.map(s => `<option value="${s}"${s === box.session ? ' selected' : ''}>${s}</option>`).join('')}
          </select>
          <button class="btn" onclick="refreshSessions()">↺</button>
        </div>
      </div>
    </div>

    <div class="ls">
      <div class="ls-title">Open Ports</div>
      <div class="ls-body">
        <div class="row">
          <input class="tinput" id="port-in" placeholder="22 80 445 …" style="flex:1"
            onkeydown="if(event.key==='Enter')addPorts('${boxId}')">
          <button class="btn" onclick="addPorts('${boxId}')">Add</button>
        </div>
        <div class="chips" id="chips">${chipsHtml(box)}</div>
        <textarea class="ta" id="nmap-ta" placeholder="Paste nmap output…">${esc(box.nmap_raw || '')}</textarea>
        <button class="btn g" style="margin-top:4px;width:100%" onclick="parseNmap('${boxId}')">⚡ Parse nmap</button>
      </div>
    </div>

    <div class="ls" style="flex:1;display:flex;flex-direction:column;overflow:hidden;border-bottom:none">
      <div class="ls-title">Variables
        <button class="lbtn" onclick="clearVars('${boxId}')">clear all</button>
      </div>
      <div class="vars-scroll" id="vars-scroll">
        ${allVarRows}

        <div class="divider">
          <div class="sublabel">Add predefined variable</div>
          <select class="extras-sel" onchange="addExtraVar('${boxId}',this)">
            <option value="">— pick variable —</option>
            ${availExtras.map(v => `<option value="${v.key}" title="${v.desc}">${v.key} — ${v.desc}</option>`).join('')}
          </select>
          <div class="sublabel" style="margin-top:6px">Add custom variable</div>
          <div class="add-row">
            <input class="vkey-in" id="cvar-key" placeholder="KEY">
            <input class="vval-in" id="cvar-val" placeholder="value"
              onkeydown="if(event.key==='Enter')addCustomVar('${boxId}')">
            <button class="btn g" onclick="addCustomVar('${boxId}')">+</button>
          </div>
        </div>
      </div>
    </div>

  `;

  // Wire variable input events (use event delegation on the scroll container)
  const scroll = document.getElementById('vars-scroll');
  scroll.addEventListener('input', e => {
    const inp = e.target;
    if (!inp.classList.contains('vval')) return;
    onVarInput(boxId, inp);
  });

  // Restore utils state if it was open
  if (utilsOpen) {
    document.getElementById('utils-arrow').classList.add('open');
    renderUtils(boxId);
    document.getElementById('utils-body').classList.add('open');
  }
}

function varRowHtml(key, val, deletable) {
  const del = deletable
    ? `<button class="vdel" onclick="removeVar('${key}')" title="Remove">✕</button>`
    : '<div></div>';
  return `<div class="vrow" id="vrow-${key}">
    <div class="vkey" title="${key}">${key}</div>
    <input class="vval${val ? ' set' : ''}" data-var="${key}" value="${esc(val)}" placeholder="…">
    ${del}
  </div>`;
}

function chipsHtml(box) {
  return (box.ports || []).map(p =>
    `<div class="chip" onclick="removePort('${box.id}','${p}')">
      ${p}<span class="cx">✕</span>
    </div>`
  ).join('');
}

function onVarInput(boxId, inp) {
  const key = inp.dataset.var;
  const val = inp.value;
  inp.classList.toggle('set', !!val);
  const box = boxes[boxId];
  if (key in (box.custom_vars || {})) box.custom_vars[key] = val;
  else box.variables[key] = val;
  clearTimeout(inp._t);
  inp._t = setTimeout(() => {
    api('PATCH', `/api/boxes/${boxId}`, { variables: box.variables, custom_vars: box.custom_vars });
    if (curTab) renderSection(boxId, curTab);
    if (utilsOpen) renderUtils(boxId);
  }, 400);
}

async function onSessChange(boxId, sess) {
  boxes[boxId].session = sess;
  await api('PATCH', `/api/boxes/${boxId}`, { session: sess });
}

async function addPorts(boxId) {
  const inp  = document.getElementById('port-in');
  const nums = (inp.value || '').match(/\d+/g) || [];
  if (!nums.length) return;
  const box = boxes[boxId];
  const ex  = new Set((box.ports || []).map(String));
  nums.forEach(n => ex.add(n));
  box.ports = [...ex].sort((a, b) => parseInt(a) - parseInt(b));
  await api('PATCH', `/api/boxes/${boxId}`, { ports: box.ports });
  inp.value = '';
  document.getElementById('chips').innerHTML = chipsHtml(box);
  plans[boxId] = null;
  await loadPlan(boxId);
  toast('Port added — plan updated', 'ok');
}

async function removePort(boxId, port) {
  const box = boxes[boxId];
  box.ports = (box.ports || []).filter(p => String(p) !== String(port));
  await api('PATCH', `/api/boxes/${boxId}`, { ports: box.ports });
  const chips = document.getElementById('chips');
  if (chips) chips.innerHTML = chipsHtml(box);
  plans[boxId] = null;
  await loadPlan(boxId);
}

async function parseNmap(boxId) {
  const ta = document.getElementById('nmap-ta');
  if (!ta) return;
  const r = await api('POST', `/api/boxes/${boxId}/nmap`, { nmap: ta.value });
  if (r.error) { toast(r.error, 'err'); return; }
  boxes[boxId].ports = r.ports;
  const chips = document.getElementById('chips');
  if (chips) chips.innerHTML = chipsHtml(boxes[boxId]);
  plans[boxId] = null;
  await loadPlan(boxId);
  toast(`Parsed ${r.ports.length} port(s) — plan updated`, 'ok');
}

async function addExtraVar(boxId, sel) {
  const key = sel.value;
  if (!key) return;
  sel.value = '';
  const box = boxes[boxId];
  if (!box.active_extras) box.active_extras = [];
  if (!box.active_extras.includes(key)) {
    box.active_extras.push(key);
    box.variables[key] = box.variables[key] || '';
  }
  await api('PATCH', `/api/boxes/${boxId}`, { active_extras: box.active_extras });
  // Add row to DOM directly without full re-render
  const scroll = document.getElementById('vars-scroll');
  const divider = scroll.querySelector('.divider');
  const row = document.createElement('div');
  row.className = 'vrow'; row.id = `vrow-${key}`;
  row.innerHTML = `<div class="vkey" title="${key}">${key}</div>
    <input class="vval" data-var="${key}" value="" placeholder="…">
    <button class="vdel" onclick="removeVar('${key}')" title="Remove">✕</button>`;
  scroll.insertBefore(row, divider);
  // Remove from dropdown
  const opt = sel.querySelector(`option[value="${key}"]`);
  if (opt) opt.remove();
}

async function addCustomVar(boxId) {
  const keyEl = document.getElementById('cvar-key');
  const valEl = document.getElementById('cvar-val');
  const key   = (keyEl.value || '').trim().toUpperCase().replace(/\W+/g, '_');
  const val   = (valEl.value || '').trim();
  if (!key) { toast('Enter a variable name', 'err'); return; }
  const box = boxes[boxId];
  if (!box.custom_vars) box.custom_vars = {};
  box.custom_vars[key] = val;
  await api('PATCH', `/api/boxes/${boxId}`, { custom_vars: box.custom_vars });
  keyEl.value = ''; valEl.value = '';
  // Add row to DOM directly
  const scroll  = document.getElementById('vars-scroll');
  const divider = scroll.querySelector('.divider');
  const row     = document.createElement('div');
  row.className = 'vrow'; row.id = `vrow-${key}`;
  row.innerHTML = `<div class="vkey" title="${key}">${key}</div>
    <input class="vval${val ? ' set' : ''}" data-var="${key}" value="${esc(val)}" placeholder="…">
    <button class="vdel" onclick="removeVar('${key}')" title="Remove">✕</button>`;
  scroll.insertBefore(row, divider);
  toast(`${key} added`, 'ok');
}

async function removeVar(key) {
  if (!curBox) return;
  const box = boxes[curBox];
  if (key in (box.custom_vars || {})) delete box.custom_vars[key];
  else box.active_extras = (box.active_extras || []).filter(k => k !== key);
  await api('PATCH', `/api/boxes/${curBox}`,
    { custom_vars: box.custom_vars, active_extras: box.active_extras });
  const row = document.getElementById(`vrow-${key}`);
  if (row) row.remove();
  // Re-add to extras dropdown if it's a known extra
  const def = extraDefs.find(v => v.key === key);
  if (def) {
    const sel = document.querySelector('.extras-sel');
    if (sel) sel.appendChild(makeOpt(def.key, `${def.key} — ${def.desc}`));
  }
}

function clearVars(boxId) {
  const box = boxes[boxId];
  Object.keys(box.variables).forEach(k => box.variables[k] = '');
  box.custom_vars = {};
  api('PATCH', `/api/boxes/${boxId}`, { variables: box.variables, custom_vars: {} });
  document.querySelectorAll('#vars-scroll .vval').forEach(inp => {
    inp.value = ''; inp.classList.remove('set');
  });
}

// ── Utils ──────────────────────────────────────────────────────────────────
function toggleUtils() {
  utilsOpen = !utilsOpen;
  const popup = document.getElementById('utils-popup');
  const fab   = document.getElementById('utils-fab');
  if (!popup) return;
  popup.classList.toggle('open', utilsOpen);
  if (fab) fab.style.display = utilsOpen ? 'none' : 'flex';
  if (utilsOpen) renderUtils(curBox);
}

function renderUtils(boxId) {
  const body = document.getElementById('utils-popup-body');
  const title = document.getElementById('utils-popup-title');
  if (!body) return;
  const box  = boxes[boxId] || {};
  const vars = allVars(box);
  const osLabel = box.os === 'linux' ? 'Linux' : 'Windows';
  if (title) title.textContent = `Utils — ${osLabel}`;
  body.innerHTML = '';
  (utilsSecs || []).forEach(sec => {
    const hdr = document.createElement('div');
    hdr.className = 'utils-shdr'; hdr.textContent = sec.section; body.appendChild(hdr);
    (sec.commands || []).forEach((cmd, i) => {
      const row = document.createElement('div'); row.className = 'utils-row';
      const txt = document.createElement('div'); txt.className = 'utils-txt';
      txt.innerHTML = renderVars(cmd.cmd, vars);
      const cp  = document.createElement('button'); cp.className = 'utils-cp'; cp.textContent = '⎘';
      cp.title = 'Copy'; cp.onclick = () => copyCmd(cmd.cmd, vars);
      const run = document.createElement('button'); run.className = 'utils-run'; run.textContent = '▶';
      run.title = 'Send to screen'; run.onclick = () => runCmd(boxId, `utils:${i}`, cmd.cmd);
      row.appendChild(txt); row.appendChild(cp); row.appendChild(run);
      body.appendChild(row);
    });
  });
}

// ── Plan ───────────────────────────────────────────────────────────────────
async function loadPlan(boxId) {
  const r = await api('GET', `/api/boxes/${boxId}/plan`);
  if (r.error) { toast('Plan error: ' + r.error, 'err'); return; }
  plans[boxId] = r.plan || [];
  boxes[boxId].done_cmds = r.done_cmds || [];
  renderBoxTabs();
  renderPlanTabs(boxId);
}

function renderPlanTabs(boxId) {
  const col = document.getElementById('plan-col');
  if (!col) return;
  const plan = plans[boxId] || [];

  if (!plan.length) {
    col.innerHTML = '<div class="cmds" style="align-items:center;justify-content:center;"><span style="color:var(--dim)">Add ports to build a plan</span></div>';
    return;
  }

  // Build tab bar
  col.innerHTML = '';
  const tabBar = document.createElement('div'); tabBar.className = 'plan-tabs';
  col.appendChild(tabBar);

  const box = boxes[boxId];
  plan.forEach(section => {
    const total = (section.sections || []).reduce((a, s) => a + s.commands.length, 0);
    const done  = (box.done_cmds || []).filter(k => k.startsWith(section.id + ':')).length;
    const btn   = document.createElement('div');
    btn.className = 'ptab';
    btn.dataset.phase = section.phase;
    btn.innerHTML = `<span class="pdot"></span>${esc(section.label)}<span class="pp ${done ? 'd' : ''}">${done}/${total}</span>`;
    btn.onclick = () => activateTab(boxId, section.id);
    tabBar.appendChild(btn);
  });

  // Select first tab (or restore curTab if still valid)
  const validTab = plan.find(s => s.id === curTab) ? curTab : plan[0].id;
  activateTab(boxId, validTab);
}

function activateTab(boxId, sectionId) {
  curTab = sectionId;
  document.querySelectorAll('.ptab').forEach((t, i) => {
    t.classList.toggle('active', (plans[boxId] || [])[i]?.id === sectionId);
  });
  renderSection(boxId, sectionId);
}

function renderSection(boxId, sectionId) {
  const col = document.getElementById('plan-col');
  if (!col) return;
  // Remove old cmds div
  const old = col.querySelector('.cmds');
  if (old) old.remove();

  const plan    = plans[boxId] || [];
  const section = plan.find(s => s.id === sectionId);
  if (!section) return;

  const box  = boxes[boxId];
  const vars = allVars(box);
  const done = new Set(box.done_cmds || []);

  const cmds = document.createElement('div'); cmds.className = 'cmds';

  (section.sections || []).forEach((sec, si) => {
    const secDone = sec.commands.filter((_, ci) => done.has(`${sectionId}:${si}:${ci}`)).length;
    const hdr = document.createElement('div'); hdr.className = 'sec-hdr';
    hdr.innerHTML = `<span>${esc(sec.section)}</span><span class="sec-prog">${secDone}/${sec.commands.length}</span>`;
    cmds.appendChild(hdr);

    sec.commands.forEach((cmd, ci) => {
      const key    = `${sectionId}:${si}:${ci}`;
      const isDone = done.has(key);
      const row    = document.createElement('div');
      row.className = 'crow' + (isDone ? ' done' : '');
      row.tabIndex  = 0;

      const runB = document.createElement('button'); runB.className = 'crun'; runB.textContent = '▶';
      runB.onclick = e => { e.stopPropagation(); runCmd(boxId, key, cmd.cmd); };

      const body = document.createElement('div'); body.className = 'cbody';
      if (cmd.comment) {
        const c = document.createElement('div'); c.className = 'ccmt';
        c.textContent = '# ' + cmd.comment; body.appendChild(c);
      }
      const txt = document.createElement('div'); txt.className = 'ctxt';
      txt.innerHTML = renderVars(cmd.cmd, vars); body.appendChild(txt);

      const acts = document.createElement('div'); acts.className = 'cacts';
      const cpB  = document.createElement('button'); cpB.className = 'cbtn'; cpB.textContent = '⎘'; cpB.title = 'Copy (C)';
      cpB.onclick = e => { e.stopPropagation(); copyCmd(cmd.cmd, vars); };
      const dnB  = document.createElement('button'); dnB.className = 'cbtn'; dnB.textContent = isDone ? '↺' : '✓'; dnB.title = 'Toggle done (D)';
      dnB.onclick = e => { e.stopPropagation(); toggleDone(boxId, key, sectionId); };
      acts.appendChild(cpB); acts.appendChild(dnB);

      row.appendChild(runB); row.appendChild(body); row.appendChild(acts);

      row.addEventListener('keydown', e => {
        if (e.ctrlKey && e.key === 'Enter') { e.preventDefault(); runCmd(boxId, key, cmd.cmd); }
        if (e.key === 'c' && !e.ctrlKey) copyCmd(cmd.cmd, vars);
        if (e.key === 'd' && !e.ctrlKey) toggleDone(boxId, key, sectionId);
      });

      cmds.appendChild(row);
    });
  });

  col.appendChild(cmds);
}

// ── Command ops ────────────────────────────────────────────────────────────
async function runCmd(boxId, cmdKey, rawCmd) {
  const box = boxes[boxId];
  if (!box?.session) { toast('No screen session — set one in the left panel', 'err'); return; }
  const r = await api('POST', `/api/boxes/${boxId}/run`, { command: rawCmd, cmd_key: cmdKey });
  if (r.status === 'ok') {
    if (!boxes[boxId].done_cmds.includes(cmdKey)) boxes[boxId].done_cmds.push(cmdKey);
    toast(`→ ${box.session}`, 'ok');
    if (curTab) renderSection(boxId, curTab);
    renderPlanTabs(boxId);
    renderBoxTabs();
  } else {
    toast('Error: ' + (r.error || 'unknown'), 'err');
  }
}

function copyCmd(rawCmd, vars) {
  const s = rawCmd.replace(/\{\{(\w+)\}\}/g, (_, k) => vars[k] || `{{${k}}}`);
  navigator.clipboard.writeText(s).then(() => toast('Copied', 'info'));
}

async function toggleDone(boxId, key, sectionId) {
  const r = await api('POST', `/api/boxes/${boxId}/done`, { cmd_key: key });
  boxes[boxId].done_cmds = r.done_cmds;
  renderSection(boxId, sectionId || curTab);
  renderPlanTabs(boxId);
  renderBoxTabs();
}

// ── Helpers ────────────────────────────────────────────────────────────────
function allVars(box) {
  return { ...(box.variables || {}), ...(box.custom_vars || {}) };
}

function renderVars(cmd, vars) {
  return esc(cmd).replace(/\{\{(\w+)\}\}/g, (_, k) => {
    const v = vars[k];
    return v
      ? `<span class="ph s" title="${k}=${esc(v)}">${esc(v)}</span>`
      : `<span class="ph m">{{${k}}}</span>`;
  });
}

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

let _tt;
function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = `toast ${type} show`;
  clearTimeout(_tt); _tt = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── Modals ─────────────────────────────────────────────────────────────────
function openModal(id) {
  if (id === 'mbox') updateSessionSelects();
  document.getElementById(id).classList.add('open');
  const inp = document.querySelector(`#${id} input`);
  if (inp) setTimeout(() => inp.focus(), 50);
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function openNewSess() { document.getElementById('ns-name').value = ''; openModal('msess'); }

async function createBox() {
  const name    = document.getElementById('nb-name').value.trim();
  const os      = document.getElementById('nb-os').value;
  const session = document.getElementById('nb-sess').value;
  if (!name) { toast('Name required', 'err'); return; }
  const r = await api('POST', '/api/boxes', { name, os, session });
  if (r.error) { toast(r.error, 'err'); return; }
  boxes[r.box.id] = r.box;
  closeModal('mbox');
  renderBoxTabs();
  await switchBox(r.box.id);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.mbg.open').forEach(m => m.classList.remove('open'));
    if (utilsOpen) toggleUtils();
  }
  if (e.key === 'Enter' && document.getElementById('mbox').classList.contains('open')) createBox();
  if (e.key === 'Enter' && document.getElementById('msess').classList.contains('open')) createSession();
});

// ── API ────────────────────────────────────────────────────────────────────
async function api(method, url, body) {
  try {
    const r = await fetch(url, {
      method,
      headers: { 'Content-Type': 'application/json' },
      body: body ? JSON.stringify(body) : undefined,
    });
    return await r.json();
  } catch (e) { return { error: e.message }; }
}

init();
